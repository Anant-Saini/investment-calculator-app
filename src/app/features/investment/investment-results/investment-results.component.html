<div>
  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>Investment Value</th>
        <th>Interest (Year)</th>
        <th>Total Interest</th>
        <th>Invested Capital</th>
      </tr>
    </thead>
    <tbody>
      @for (annualData of getInvestmentResults; track annualData.year) {
        <tr>
          <td>{{ annualData.year }}</td>
          <td>{{ annualData.valueEndOfYear }}</td>
          <td>{{ annualData.interest }}</td>
          <td>{{ annualData.totalInterest }}</td>
          <td>{{ annualData.totalAmountInvested }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
